<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Calendar Data Exporter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-indigo-600 mb-2">ระบบส่งออกข้อมูลปฏิทินโหราศาสตร์</h1>
            <p class="text-sm text-slate-500">ดึงข้อมูลและเชื่อมโยงระบบปฏิทินสุริยยาตร์อัตโนมัติ</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">ช่วงปี ค.ศ. ที่ต้องการข้อมูล (2021 - 2027)</label>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <span class="text-xs text-slate-400 block mb-1">เริ่มต้น</span>
                        <input type="number" id="startYear" value="2021" min="2021" max="2027" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <span class="text-xs text-slate-400 block mb-1">สิ้นสุด</span>
                        <input type="number" id="endYear" value="2027" min="2021" max="2027" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
            </div>

            <button id="exportBtn" onclick="startExport()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-lg transition duration-200 shadow-md shadow-indigo-200 flex justify-center items-center gap-2">
                📂 ดาวน์โหลดไฟล์ Excel (2021 - 2027)
            </button>
            
            <p id="statusMessage" class="text-center text-sm text-indigo-500 font-medium hidden mt-4">⏳ ระบบกำลังดึงข้อมูลและสร้างไฟล์ Excel กรุณารอประมาณ 1-2 นาที...</p>
        </div>
    </div>

    <script>
        function startExport() {
            const start = document.getElementById('startYear').value;
            const end = document.getElementById('endYear').value;
            const status = document.getElementById('statusMessage');
            const btn = document.getElementById('exportBtn');

            status.classList.remove('hidden');
            btn.disabled = true;
            btn.classList.add('opacity-50');

            // ในหน้างานจริง จะยิง API ไปที่หลังบ้าน (Backend) ของเราที่เราสร้างขึ้น
            // ตัวอย่าง: window.location.href = `/api/export?start=${start}&end=${end}`;
            
            setTimeout(() => {
                status.innerText = "✅ ดึงข้อมูลและสร้างไฟล์ Excel สำเร็จ!";
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }, 3000);
        }
    </script>
</body>
</html>
